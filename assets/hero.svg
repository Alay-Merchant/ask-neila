<svg width="680" height="576" viewBox="0 0 680 576" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Neila the alien explains compound interest</title>
<desc>A three-step illustrated explainer: the bank pays you interest, your interest earns its own interest, and over time the money snowballs into a fortune.</desc>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&amp;display=swap');.f{font-family:'Fredoka','Comic Sans MS',sans-serif}</style>
</defs>

<rect x="0" y="0" width="680" height="576" fill="#EAF6EC"/>

<g><circle cx="602" cy="250" r="18" fill="#FFD23F" stroke="#C9962A" stroke-width="2.5"/><text class="f" x="602" y="256" font-size="16" font-weight="600" fill="#8A6410" text-anchor="middle">£</text><animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" dur="3.4s" repeatCount="indefinite"/></g>
<g><circle cx="582" cy="444" r="14" fill="#FFD23F" stroke="#C9962A" stroke-width="2.5"/><text class="f" x="582" y="449" font-size="13" font-weight="600" fill="#8A6410" text-anchor="middle">£</text><animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" dur="3.8s" begin="0.8s" repeatCount="indefinite"/></g>

<g transform="translate(626,56)">
  <circle cx="0" cy="0" r="24" fill="#FFD23F" stroke="#C9962A" stroke-width="3"/>
  <text class="f" x="0" y="8" font-size="24" font-weight="600" fill="#8A6410" text-anchor="middle">£</text>
  <animateTransform attributeName="transform" type="translate" values="626 56;626 50;626 56" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" dur="3s" repeatCount="indefinite"/>
</g>

<text class="f" x="34" y="52" font-size="28" font-weight="600" fill="#14402A">What is compound interest?</text>
<text class="f" x="34" y="80" font-size="14" font-weight="400" fill="#3E6B54">The most powerful idea in money — made simple</text>

<g transform="translate(30,114)">
  <rect x="0" y="0" width="448" height="116" rx="16" fill="#FFFFFF" stroke="#14402A" stroke-width="3"/>
  <circle cx="38" cy="40" r="17" fill="#FFD23F" stroke="#14402A" stroke-width="2"/>
  <text class="f" x="38" y="46" font-size="18" font-weight="600" fill="#5A4410" text-anchor="middle">1</text>
  <circle cx="113" cy="64" r="16" fill="#FFD23F" stroke="#C9962A" stroke-width="2"/>
  <text class="f" x="113" y="70" font-size="16" font-weight="600" fill="#8A6410" text-anchor="middle">£</text>
  <path d="M133 56 L150 42" fill="none" stroke="#2E9E5E" stroke-width="2.5" marker-end="url(#ah)"/>
  <circle cx="160" cy="38" r="9" fill="#FFD23F" stroke="#C9962A" stroke-width="2"/>
  <text class="f" x="160" y="42" font-size="10" font-weight="600" fill="#8A6410" text-anchor="middle">£</text>
  <text class="f" x="208" y="46" font-size="17" font-weight="600" fill="#14402A">The bank pays you to wait</text>
  <text class="f" x="208" y="72" font-size="13" font-weight="400" fill="#3E6B54">Leave money in the bank and it slowly</text>
  <text class="f" x="208" y="91" font-size="13" font-weight="400" fill="#3E6B54">earns a little extra — that's interest.</text>
</g>

<g transform="translate(30,246)">
  <rect x="0" y="0" width="448" height="116" rx="16" fill="#FFFFFF" stroke="#14402A" stroke-width="3"/>
  <circle cx="38" cy="40" r="17" fill="#7FD0A0" stroke="#14402A" stroke-width="2"/>
  <text class="f" x="38" y="46" font-size="18" font-weight="600" fill="#14402A" text-anchor="middle">2</text>
  <path d="M92 88 Q130 96 180 60" fill="none" stroke="#2E9E5E" stroke-width="2.5" marker-end="url(#ah)"/>
  <circle cx="100" cy="78" r="8" fill="#FFD23F" stroke="#C9962A" stroke-width="2"/>
  <circle cx="130" cy="68" r="12" fill="#FFD23F" stroke="#C9962A" stroke-width="2"/>
  <circle cx="168" cy="56" r="17" fill="#FFD23F" stroke="#C9962A" stroke-width="2"/>
  <text class="f" x="168" y="62" font-size="16" font-weight="600" fill="#8A6410" text-anchor="middle">£</text>
  <text class="f" x="208" y="46" font-size="17" font-weight="600" fill="#14402A">Interest earns interest</text>
  <text class="f" x="208" y="72" font-size="13" font-weight="400" fill="#3E6B54">Next year you earn extra on the extra</text>
  <text class="f" x="208" y="91" font-size="13" font-weight="400" fill="#3E6B54">too — the pile grows itself.</text>
</g>

<g transform="translate(30,378)">
  <rect x="0" y="0" width="448" height="116" rx="16" fill="#FFFFFF" stroke="#14402A" stroke-width="3"/>
  <circle cx="38" cy="40" r="17" fill="#FFB454" stroke="#14402A" stroke-width="2"/>
  <text class="f" x="38" y="46" font-size="18" font-weight="600" fill="#5A4410" text-anchor="middle">3</text>
  <path d="M96 92 C124 86 152 70 188 40" fill="none" stroke="#2E9E5E" stroke-width="3" marker-end="url(#ah)"/>
  <circle cx="96" cy="92" r="6" fill="#FFD23F" stroke="#C9962A" stroke-width="1.5"/>
  <circle cx="178" cy="52" r="8" fill="#FFD23F" stroke="#C9962A" stroke-width="2"/>
  <circle cx="184" cy="44" r="8" fill="#FFD23F" stroke="#C9962A" stroke-width="2"/>
  <text class="f" x="208" y="46" font-size="17" font-weight="600" fill="#14402A">Time makes it explode</text>
  <text class="f" x="208" y="72" font-size="13" font-weight="400" fill="#3E6B54">Wait long enough and a small sum</text>
  <text class="f" x="208" y="91" font-size="13" font-weight="400" fill="#3E6B54">snowballs into a small fortune.</text>
</g>

