<rect x="30" y="510" width="616" height="44" rx="14" fill="#FFE7A0" stroke="#14402A" stroke-width="3"/>
<text class="f" x="338" y="538" font-size="13.5" font-weight="500" fill="#7A5A12" text-anchor="middle">Fun fact: £100 left to grow at 8% a year becomes over £1,000 in 30 years — adding nothing.</text>
</svg>
