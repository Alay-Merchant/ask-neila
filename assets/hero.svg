<svg width="680" height="576" viewBox="0 0 680 576" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Neila the alien explains why the sky is blue</title>
<desc>A three-step illustrated explainer: sunlight is every colour, air scatters the blue, so blue reaches your eyes from everywhere and the sky looks blue.</desc>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&amp;display=swap');.f{font-family:'Fredoka','Comic Sans MS',sans-serif}</style>
</defs>

<rect x="0" y="0" width="680" height="576" fill="#CFE8FF"/>

<g opacity="0.95" fill="#FFFFFF"><ellipse cx="602" cy="250" rx="32" ry="17"/><circle cx="585" cy="247" r="15"/><circle cx="607" cy="240" r="19"/><circle cx="624" cy="249" r="13"/></g>
<g opacity="0.9" fill="#FFFFFF"><ellipse cx="585" cy="446" rx="28" ry="15"/><circle cx="571" cy="443" r="13"/><circle cx="590" cy="437" r="16"/><circle cx="604" cy="445" r="11"/></g>

<g transform="translate(626,56)">
  <g><line x1="0" y1="-40" x2="0" y2="-30" stroke="#F2B705" stroke-width="4" stroke-linecap="round"/><line x1="28" y1="-28" x2="21" y2="-21" stroke="#F2B705" stroke-width="4" stroke-linecap="round"/><line x1="40" y1="0" x2="30" y2="0" stroke="#F2B705" stroke-width="4" stroke-linecap="round"/><line x1="28" y1="28" x2="21" y2="21" stroke="#F2B705" stroke-width="4" stroke-linecap="round"/><line x1="0" y1="40" x2="0" y2="30" stroke="#F2B705" stroke-width="4" stroke-linecap="round"/><line x1="-28" y1="28" x2="-21" y2="21" stroke="#F2B705" stroke-width="4" stroke-linecap="round"/><line x1="-40" y1="0" x2="-30" y2="0" stroke="#F2B705" stroke-width="4" stroke-linecap="round"/><line x1="-28" y1="-28" x2="-21" y2="-21" stroke="#F2B705" stroke-width="4" stroke-linecap="round"/><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/></g>
  <circle cx="0" cy="0" r="23" fill="#FFD23F" stroke="#E0A21A" stroke-width="3"/>
</g>

<text class="f" x="34" y="52" font-size="30" font-weight="600" fill="#13324A">Why is the sky blue?</text>
<text class="f" x="34" y="80" font-size="14" font-weight="400" fill="#39596F">Neila explains it so a 10-year-old gets it</text>

<g transform="translate(30,114)">
  <rect x="0" y="0" width="448" height="116" rx="16" fill="#FFFDF5" stroke="#13324A" stroke-width="3"/>
  <circle cx="38" cy="40" r="17" fill="#FF8FB1" stroke="#13324A" stroke-width="2"/>
  <text class="f" x="38" y="46" font-size="18" font-weight="600" fill="#13324A" text-anchor="middle">1</text>
  <circle cx="120" cy="62" r="14" fill="#FFFFFF" stroke="#13324A" stroke-width="2"/>
  <line x1="135" y1="48" x2="180" y2="36" stroke="#FF5C5C" stroke-width="4" stroke-linecap="round"/>
  <line x1="136" y1="55" x2="182" y2="50" stroke="#FF9F3C" stroke-width="4" stroke-linecap="round"/>
  <line x1="136" y1="62" x2="184" y2="62" stroke="#FFD23F" stroke-width="4" stroke-linecap="round"/>
  <line x1="136" y1="69" x2="182" y2="74" stroke="#6BCB77" stroke-width="4" stroke-linecap="round"/>
  <line x1="135" y1="76" x2="180" y2="88" stroke="#4D9BE6" stroke-width="4" stroke-linecap="round"/>
  <text class="f" x="208" y="46" font-size="17" font-weight="600" fill="#13324A">Sunlight is every colour</text>
  <text class="f" x="208" y="72" font-size="13" font-weight="400" fill="#39596F">White light is really a whole rainbow</text>
  <text class="f" x="208" y="91" font-size="13" font-weight="400" fill="#39596F">squished together.</text>
</g>

<g transform="translate(30,246)">
  <rect x="0" y="0" width="448" height="116" rx="16" fill="#FFFDF5" stroke="#13324A" stroke-width="3"/>
  <circle cx="38" cy="40" r="17" fill="#6BCB77" stroke="#13324A" stroke-width="2"/>
  <text class="f" x="38" y="46" font-size="18" font-weight="600" fill="#13324A" text-anchor="middle">2</text>
  <circle cx="100" cy="44" r="3" fill="#9FB8C9"/><circle cx="168" cy="48" r="3" fill="#9FB8C9"/><circle cx="104" cy="82" r="3" fill="#9FB8C9"/><circle cx="170" cy="80" r="3" fill="#9FB8C9"/>
  <path d="M132 62 Q112 44 100 48" fill="none" stroke="#2A6BB0" stroke-width="2.5" marker-end="url(#ah)"/>
  <path d="M132 62 Q156 44 168 50" fill="none" stroke="#2A6BB0" stroke-width="2.5" marker-end="url(#ah)"/>
  <path d="M132 62 Q150 82 168 78" fill="none" stroke="#2A6BB0" stroke-width="2.5" marker-end="url(#ah)"/>
  <circle cx="132" cy="62" r="12" fill="#4D9BE6" stroke="#13324A" stroke-width="2"/>
  <circle cx="128" cy="58" r="3" fill="#BFE0FF"/>
  <text class="f" x="208" y="46" font-size="17" font-weight="600" fill="#13324A">Air scatters the blue</text>
  <text class="f" x="208" y="72" font-size="13" font-weight="400" fill="#39596F">Blue light is bouncy, so the air flings</text>
  <text class="f" x="208" y="91" font-size="13" font-weight="400" fill="#39596F">it all across the sky.</text>
</g>

<g transform="translate(30,378)">
  <rect x="0" y="0" width="448" height="116" rx="16" fill="#FFFDF5" stroke="#13324A" stroke-width="3"/>
  <circle cx="38" cy="40" r="17" fill="#6EC6FF" stroke="#13324A" stroke-width="2"/>
  <text class="f" x="38" y="46" font-size="18" font-weight="600" fill="#13324A" text-anchor="middle">3</text>
  <path d="M82 46 L112 56" fill="none" stroke="#2A6BB0" stroke-width="2.5" marker-end="url(#ah)"/>
  <path d="M84 82 L112 70" fill="none" stroke="#2A6BB0" stroke-width="2.5" marker-end="url(#ah)"/>
  <path d="M134 34 L134 48" fill="none" stroke="#2A6BB0" stroke-width="2.5" marker-end="url(#ah)"/>
  <ellipse cx="138" cy="64" rx="22" ry="14" fill="#FFFFFF" stroke="#13324A" stroke-width="2"/>
  <circle cx="138" cy="64" r="9" fill="#4D9BE6"/>
  <circle cx="138" cy="64" r="4" fill="#13324A"/>
  <circle cx="141" cy="61" r="1.6" fill="#FFFFFF"/>
  <text class="f" x="208" y="46" font-size="17" font-weight="600" fill="#13324A">Blue comes from everywhere</text>
  <text class="f" x="208" y="72" font-size="13" font-weight="400" fill="#39596F">Your eyes catch blue from every</text>
  <text class="f" x="208" y="91" font-size="13" font-weight="400" fill="#39596F">direction — so the sky looks blue.</text>
</g>

